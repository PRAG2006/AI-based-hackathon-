version: '3.9'

services:
  frontend:
    build: .
    ports:
      - '3000:3000'
    volumes:
      - .:/app
    command: npm run dev

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload